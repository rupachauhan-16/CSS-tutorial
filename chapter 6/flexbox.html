<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flexbox</title>
    <style>
      .container {
        background-color: rgb(198, 121, 93);
        height: 759px;
        display: flex;
        /* flex-direction: column; */
        /* flex-direction: row; */           /* row is a by default direction */
        /* flex-direction: column-reverse; */
        flex-direction: row-reverse;
        flex-wrap: wrap-reverse;
        justify-content: center;
        align-items: center;               /*we can use either align-item or align-content at a time */
        /* align-content: center; */
      }
      .box1 {
        height: 150px;
        width: 200px;
        background-color: aqua;
        border: 1px solid black;
      }
      .box2 {
        height: 150px;
        width: 200px;
        background-color: rgb(56, 170, 73);
        border: 1px solid black;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box1">box1</div>
      <div class="box2">box2</div>
      <div class="box2">box3</div>
      <div class="box2">box4</div>
    </div>
  </body>
</html>
